<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Five Nights at Freddy's — Главное меню</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <!-- Экран входа / регистрации -->
    <div id="auth-section">
      <h1>Five Nights at Freddy's</h1>
      <div id="login-form">
        <input type="text" id="username" placeholder="Логин">
        <input type="password" id="password" placeholder="Пароль">
        <button id="login-btn">Войти</button>
        <button id="register-btn">Зарегистрироваться</button>
      </div>
      <p id="auth-message"></p>
    </div>

    <!-- Главное меню (скрыто до входа) -->
    <div id="menu-section" style="display: none;">
      <h2>Добро пожаловать, <span id="display-username"></span>!</h2>
      <p>Монеты: <span id="display-coins">0</span></p>
      <button id="new-game-btn">Новая игра</button>
      <button id="continue-btn">Продолжить</button>
      <button id="leaderboard-btn">Рекорды</button>
      <button id="shop-btn">Магазин</button>
      <button id="admin-btn" style="display: none;">Админ-панель</button>
      <button id="logout-btn">Выйти</button>
    </div>
  </div>

  <script>
    // ========== Инициализация базы данных (выполняется один раз) ==========
    fetch('/.netlify/functions/init-db').catch(() => {});

    // ========== API-клиент к нашим Netlify Functions ==========
    const API = {
      async register(username, password) {
        const res = await fetch('/.netlify/functions/register', {
          method: 'POST',
          body: JSON.stringify({ username, password }),
          headers: { 'Content-Type': 'application/json' }
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Ошибка регистрации');
        return data.user;
      },
      async login(username, password) {
        const res = await fetch('/.netlify/functions/login', {
          method: 'POST',
          body: JSON.stringify({ username, password }),
          headers: { 'Content-Type': 'application/json' }
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || 'Неверный логин или пароль');
        return data.user;
      },
      async saveGame(saveData) {
        await fetch('/.netlify/functions/save-game', {
          method: 'POST',
          body: JSON.stringify(saveData),
          headers: { 'Content-Type': 'application/json' }
        });
      },
      async loadGame() {
        const res = await fetch('/.netlify/functions/load-game');
        const data = await res.json();
        if (!res.ok) return null;
        return data.save;
      },
      async getCurrentUser() {
        // При перезагрузке страницы проверяем, есть ли сохранённая сессия
        const saved = JSON.parse(localStorage.getItem('currentUser'));
        if (saved) {
          // Можно запросить свежие данные с сервера (необязательно)
          return saved;
        }
        return null;
      },
      async logout() {
        localStorage.removeItem('currentUser');
        localStorage.removeItem('gameSave');
      }
    };

    // ========== Логика интерфейса ==========
    const authSection = document.getElementById('auth-section');
    const menuSection = document.getElementById('menu-section');
    const displayUsername = document.getElementById('display-username');
    const displayCoins = document.getElementById('display-coins');
    const adminBtn = document.getElementById('admin-btn');
    const authMessage = document.getElementById('auth-message');

    async function checkAuth() {
      const user = await API.getCurrentUser();
      if (user) {
        authSection.style.display = 'none';
        menuSection.style.display = 'block';
        displayUsername.textContent = user.username;
        displayCoins.textContent = user.coins ?? 0;
        if (user.role === 'admin') {
          adminBtn.style.display = 'inline-block';
        }
      } else {
        authSection.style.display = 'block';
        menuSection.style.display = 'none';
      }
    }

    // Вход
    document.getElementById('login-btn').addEventListener('click', async () => {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!username || !password) {
        authMessage.textContent = 'Заполните все поля';
        return;
      }
      try {
        const user = await API.login(username, password);
        localStorage.setItem('currentUser', JSON.stringify(user));
        authMessage.textContent = '';
        checkAuth();
      } catch (err) {
        authMessage.textContent = err.message;
      }
    });

    // Регистрация
    document.getElementById('register-btn').addEventListener('click', async () => {
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!username || !password) {
        authMessage.textContent = 'Заполните все поля';
        return;
      }
      try {
        const user = await API.register(username, password);
        // После регистрации сразу входим
        localStorage.setItem('currentUser', JSON.stringify(user));
        authMessage.textContent = '';
        checkAuth();
      } catch (err) {
        authMessage.textContent = err.message;
      }
    });

    // Выход
    document.getElementById('logout-btn').addEventListener('click', async () => {
      await API.logout();
      checkAuth();
    });

    // Переходы
    document.getElementById('new-game-btn').addEventListener('click', () => {
      window.location.href = 'game.html?new=1';
    });
    document.getElementById('continue-btn').addEventListener('click', () => {
      window.location.href = 'game.html';
    });
    document.getElementById('leaderboard-btn').addEventListener('click', () => {
      window.location.href = 'leaderboard.html';
    });
    document.getElementById('shop-btn').addEventListener('click', () => {
      window.location.href = 'shop.html';
    });
    document.getElementById('admin-btn').addEventListener('click', () => {
      window.location.href = 'admin.html';
    });

    // Первичная проверка
    checkAuth();
  </script>
</body>
</html>
