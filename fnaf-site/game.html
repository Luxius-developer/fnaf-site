<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Five Nights at Freddy's — Игра</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
    #game-container { position: relative; width: 960px; height: 640px; }
    canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 2px solid #333; cursor: pointer; }
    #hangup-btn {
      position: absolute; top: 10px; left: 10px;
      padding: 8px 15px; background: #c0392b; color: white;
      border: none; cursor: pointer; font-family: 'Courier New', monospace;
      z-index: 25; display: none; font-size: 16px; border-radius: 4px;
    }
  </style>
</head>
<body>
  <div id="game-container">
    <canvas id="game"></canvas>
    <button id="hangup-btn">Завершить звонок</button>
  </div>

  <script src="js/fnaf-core.js"></script>
  <script src="js/fnaf-render.js"></script>
  <script>
    // ---------- Проверка авторизации ----------
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (!currentUser) {
      window.location.href = 'index.html';
    }

    const urlParams = new URLSearchParams(window.location.search);
    const isNewGame = urlParams.get('new') === '1';

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    canvas.width = 960;
    canvas.height = 640;

    // Игровой движок
    const game = new FNAF.Core(canvas, {
      onGameOver: (night) => {
        // Автосохранение при смерти
        saveToCloud();
      },
      onVictory: (night) => {
        // При победе сохраняем прогресс
        saveToCloud();
        // Можно начислить монеты (реализуем позже)
      }
    });

    // Функция сохранения на сервер
    function saveToCloud() {
      const saveData = game.getSaveData();
      fetch('/.netlify/functions/save-game', {
        method: 'POST',
        body: JSON.stringify({
          userId: currentUser.id,
          night: saveData.night,
          difficulty: saveData.difficulty,
        }),
        headers: { 'Content-Type': 'application/json' }
      }).catch(err => console.error('Save error:', err));
    }

    // Загрузка с сервера
    async function loadFromCloud() {
      try {
        const res = await fetch(`/.netlify/functions/load-game?userId=${currentUser.id}`);
        if (!res.ok) return null;
        const data = await res.json();
        return data.save; // { night, difficulty }
      } catch (err) {
        console.error('Load error:', err);
        return null;
      }
    }

    // Запуск игры
    async function startGame() {
      if (isNewGame) {
        game.resetNight(1);
      } else {
        const cloudSave = await loadFromCloud();
        if (cloudSave) {
          game.loadFromSave(cloudSave);
        } else {
          game.resetNight(1);
        }
      }

      // Автосохранение каждые 30 секунд (чтобы не дёргать сервер часто)
      setInterval(() => {
        if (!game.state.gameOver && !game.state.victory) {
          saveToCloud();
        }
      }, 30000);

      // Запускаем отрисовку
      function loop() {
        game.draw();
        requestAnimationFrame(loop);
      }
      loop();

      // Запускаем звонок (если это новая игра, а не продолжение)
      // Можно условиться, что звонок всегда при старте ночи
      setTimeout(() => {
        if (!game.state.gameOver && !game.state.victory) {
          game.startPhoneCall();
        }
      }, 2000);
    }

    // Кнопка завершения звонка
    document.getElementById('hangup-btn').addEventListener('click', () => {
      game.endPhoneCall();
    });

    // Запускаем
    startGame();
  </script>
</body>
</html>
